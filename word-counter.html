<h1>Word Counter Tool</h1>
  </header>

  <div class="container">

    <div class="card">
        <div class="tool-actions">
            <button onclick="copyText()">Copy</button>
            <button onclick="clearText()">Clear</button>
        </div>
      <label class="input-label">Enter your text below</label>
      <textarea id="textInput" placeholder="Type or paste your text here..."></textarea>

      <div class="stats">

        <div class="stat-box">
            <div class="stat-title">Words</div>
            <div class="stat-value" id="words">0</div>
        </div>

        <div class="stat-box">
            <div class="stat-title">Characters</div>
            <div class="stat-value" id="chars">0</div>
        </div>

        <div class="stat-box">
            <div class="stat-title">Sentences</div>
            <div class="stat-value" id="sentences">0</div>
        </div>

</div>

    </div>

  </div>

  Advertisement
</div>
